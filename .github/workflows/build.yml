name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: write

jobs:
  build_debug:
    name: Build Debug (${{ matrix.variant }})
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore ./app/persistent-debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 365 \
            -dname "CN=Debug,O=BMO,C=MX" -storepass android -keypass android

      - name: Build Debug APK
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Debug --warning-mode summary
        env:
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant == 'gms' && 'app-debug-gms' || 'app-debug' }}
          path: app/build/outputs/apk/${{ matrix.variant }}/debug/*.apk
          
